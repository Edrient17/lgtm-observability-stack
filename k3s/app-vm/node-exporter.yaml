apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: node-exporter
  namespace: msa-demo
  labels:
    app.kubernetes.io/name: node-exporter
    app.kubernetes.io/part-of: msa-demo
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: node-exporter
  template:
    metadata:
      labels:
        app.kubernetes.io/name: node-exporter
        app.kubernetes.io/part-of: msa-demo
    spec:
      hostPID: true
      containers:
        - name: node-exporter
          image: prom/node-exporter:v1.11.1
          args:
            - --path.rootfs=/host
          ports:
            - name: metrics
              containerPort: 9100
              hostPort: 9100
          volumeMounts:
            - name: rootfs
              mountPath: /host
              readOnly: true
      volumes:
        - name: rootfs
          hostPath:
            path: /
---
apiVersion: v1
kind: Service
metadata:
  name: node-exporter
  namespace: msa-demo
  labels:
    app.kubernetes.io/name: node-exporter
    app.kubernetes.io/part-of: msa-demo
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: node-exporter
  ports:
    - name: metrics
      port: 9100
      targetPort: metrics
