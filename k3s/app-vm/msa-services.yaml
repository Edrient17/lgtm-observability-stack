apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-service
  namespace: msa-demo
  labels:
    app.kubernetes.io/name: api-service
    app.kubernetes.io/part-of: msa-demo
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: api-service
  template:
    metadata:
      labels:
        app.kubernetes.io/name: api-service
        app.kubernetes.io/part-of: msa-demo
    spec:
      containers:
        - name: api-service
          image: msa-demo:local
          imagePullPolicy: Never
          ports:
            - name: http
              containerPort: 8080
              hostPort: 8080
          envFrom:
            - configMapRef:
                name: msa-demo-config
          env:
            - name: OTEL_SERVICE_NAME
              value: api-service
            - name: SERVICE_ROLE
              value: api
            - name: PORT
              value: "8080"
            - name: CATALOG_SERVICE_URL
              value: http://catalog-service:8081
            - name: INVENTORY_SERVICE_URL
              value: http://inventory-service:8082
            - name: CART_SERVICE_URL
              value: http://cart-service:8083
            - name: ORDER_SERVICE_URL
              value: http://order-service:8084
          readinessProbe:
            httpGet:
              path: /metrics
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /metrics
              port: http
            initialDelaySeconds: 20
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: api-service
  namespace: msa-demo
  labels:
    app.kubernetes.io/name: api-service
    app.kubernetes.io/part-of: msa-demo
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: api-service
  ports:
    - name: http
      port: 8080
      targetPort: http
---
