global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: ixcloud-lgtm
    replica: prometheus-1

rule_files:
  - /etc/prometheus/rules/*.yml

remote_write:
  - url: http://mimir:9009/api/v1/push

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets:
          - localhost:9090
        labels:
          vm_role: monitoring

  - job_name: node-exporter
    static_configs:
      - targets:
          - node-exporter:9100
        labels:
          instance: monitoring-vm
          vm_role: monitoring
      - targets:
          - app-vm:9100
        labels:
          instance: app-vm
          vm_role: app

  - job_name: msa-demo
    metrics_path: /metrics
    static_configs:
      - targets:
          - app-vm:8080
        labels:
          instance: app-vm
          vm_role: app
          app_service: api-service
      - targets:
          - app-vm:8081
        labels:
          instance: app-vm
          vm_role: app
          app_service: order-service
      - targets:
          - app-vm:8082
        labels:
          instance: app-vm
          vm_role: app
          app_service: payment-service

  - job_name: grafana
    metrics_path: /metrics
    static_configs:
      - targets:
          - grafana:3000
        labels:
          vm_role: monitoring

  - job_name: loki
    metrics_path: /metrics
    static_configs:
      - targets:
          - loki:3100
        labels:
          vm_role: monitoring

  - job_name: mimir
    metrics_path: /metrics
    static_configs:
      - targets:
          - mimir:9009
        labels:
          vm_role: monitoring

  - job_name: tempo
    metrics_path: /metrics
    static_configs:
      - targets:
          - tempo:3200
        labels:
          vm_role: monitoring
