global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: ixcloud-lgtm
    replica: prometheus-1

rule_files:
  - /etc/prometheus/rules/*.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

remote_write:
  - url: http://mimir:9009/api/v1/push

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets:
          - localhost:9090
        labels:
          vm_role: monitoring

  - job_name: node-exporter
    static_configs:
      - targets:
          - node-exporter:9100
        labels:
          instance: monitoring-vm
          vm_role: monitoring

  - job_name: grafana
    metrics_path: /metrics
    static_configs:
      - targets:
          - grafana:3000
        labels:
          vm_role: monitoring

  - job_name: alertmanager
    metrics_path: /metrics
    static_configs:
      - targets:
          - alertmanager:9093
        labels:
          vm_role: monitoring

  - job_name: loki
    metrics_path: /metrics
    static_configs:
      - targets:
          - loki:3100
        labels:
          vm_role: monitoring

  - job_name: mimir
    metrics_path: /metrics
    static_configs:
      - targets:
          - mimir:9009
        labels:
          vm_role: monitoring

  - job_name: tempo
    metrics_path: /metrics
    static_configs:
      - targets:
          - tempo:3200
        labels:
          vm_role: monitoring

  - job_name: app-metrics-from-mimir
    honor_labels: true
    metrics_path: /prometheus/federate
    params:
      match[]:
        - '{job="msa-demo"}'
        - '{job="node-exporter",instance="app-vm"}'
        - '{__name__=~"demo_app_.*"}'
    static_configs:
      - targets:
          - mimir:9009
        labels:
          vm_role: monitoring
