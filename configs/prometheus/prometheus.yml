global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: ixcloud-lgtm
    replica: prometheus-1

rule_files:
  - /etc/prometheus/rules/*.yml

remote_write:
  - url: http://mimir:9009/api/v1/push

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets:
          - localhost:9090

  - job_name: node-exporter
    static_configs:
      - targets:
          - node-exporter:9100

  - job_name: demo-app
    metrics_path: /metrics
    static_configs:
      - targets:
          - demo-app:8080

  - job_name: grafana
    metrics_path: /metrics
    static_configs:
      - targets:
          - grafana:3000

  - job_name: loki
    metrics_path: /metrics
    static_configs:
      - targets:
          - loki:3100

  - job_name: mimir
    metrics_path: /metrics
    static_configs:
      - targets:
          - mimir:9009

  - job_name: tempo
    metrics_path: /metrics
    static_configs:
      - targets:
          - tempo:3200

