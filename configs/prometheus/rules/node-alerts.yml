groups:
  - name: node-resource-alerts
    rules:
      - alert: HighCpuUsage
        expr: 100 - (avg by (instance) (rate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 80
        for: 5m
        labels:
          severity: warning
          service: node-exporter
        annotations:
          summary: "CPU usage is above 80% for 5 minutes"
          description: "Instance {{ $labels.instance }} CPU usage is {{ $value | printf \"%.2f\" }}%."

      - alert: HighDiskUsage
        expr: |
          100 * (1 - (node_filesystem_avail_bytes{fstype!~"tmpfs|overlay|squashfs"} / node_filesystem_size_bytes{fstype!~"tmpfs|overlay|squashfs"})) > 85
        for: 5m
        labels:
          severity: warning
          service: node-exporter
        annotations:
          summary: "Disk usage is above 85%"
          description: "Instance {{ $labels.instance }} filesystem {{ $labels.mountpoint }} usage is {{ $value | printf \"%.2f\" }}%."

  - name: observability-pipeline-alerts
    rules:
      - alert: LokiTargetDown
        expr: up{job="loki"} == 0
        for: 2m
        labels:
          severity: critical
          service: loki
        annotations:
          summary: "Loki scrape target is down"
          description: "Prometheus cannot scrape Loki metrics."

      - alert: TempoTargetDown
        expr: up{job="tempo"} == 0
        for: 2m
        labels:
          severity: critical
          service: tempo
        annotations:
          summary: "Tempo scrape target is down"
          description: "Prometheus cannot scrape Tempo metrics."

      - alert: MimirTargetDown
        expr: up{job="mimir"} == 0
        for: 2m
        labels:
          severity: critical
          service: mimir
        annotations:
          summary: "Mimir scrape target is down"
          description: "Prometheus cannot scrape Mimir metrics."

      - alert: AlertmanagerTargetDown
        expr: up{job="alertmanager"} == 0
        for: 2m
        labels:
          severity: critical
          service: alertmanager
        annotations:
          summary: "Alertmanager scrape target is down"
          description: "Prometheus cannot scrape Alertmanager metrics or deliver alerts to Slack."

      - alert: ObservabilityPipelineTargetDown
        expr: up{job="tempo"} == 0 or up{job="loki"} == 0
        for: 2m
        labels:
          severity: warning
          service: observability-pipeline
        annotations:
          summary: "Observability ingestion dependency is unhealthy"
          description: "At least one observability pipeline target is down. Check Loki and Tempo before validating logs or traces."

  - name: msa-service-alerts
    rules:
      - alert: MsaServiceDown
        expr: up{job="msa-demo"} == 0
        for: 1m
        labels:
          severity: critical
          service: msa-demo
        annotations:
          summary: "MSA service target is down"
          description: "Prometheus cannot scrape {{ $labels.app_service }} on {{ $labels.instance }}."

      - alert: AppVmNodeExporterDown
        expr: up{job="node-exporter", instance="app-vm"} == 0
        for: 1m
        labels:
          severity: critical
          service: node-exporter
        annotations:
          summary: "App VM Node Exporter is down"
          description: "Prometheus cannot scrape App VM system metrics."

      - alert: MsaHighErrorRate
        expr: |
          (
            sum by (service) (rate(demo_app_requests_total{endpoint!="metrics",status=~"5.."}[5m]))
            /
            clamp_min(sum by (service) (rate(demo_app_requests_total{endpoint!="metrics"}[5m])), 0.001)
          ) > 0.2
          and on (service)
          sum by (service) (rate(demo_app_requests_total{endpoint!="metrics"}[5m])) > 0.01
        for: 1m
        labels:
          severity: warning
          service: msa-demo
        annotations:
          summary: "MSA service error rate is high"
          description: "{{ $labels.service }} has more than 20% 5xx responses for non-metrics requests."

      - alert: MsaHighLatencyP95
        expr: |
          histogram_quantile(
            0.95,
            sum by (le, service) (rate(demo_app_request_duration_seconds_bucket{endpoint!="metrics"}[5m]))
          ) > 1
        for: 2m
        labels:
          severity: warning
          service: msa-demo
        annotations:
          summary: "MSA service p95 latency is high"
          description: "{{ $labels.service }} p95 latency is above 1 second for non-metrics requests."
