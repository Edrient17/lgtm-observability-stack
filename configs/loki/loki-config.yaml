auth_enabled: false

server:
  http_listen_port: 3100

common:
  path_prefix: /loki
  replication_factor: 1
  ring:
    kvstore:
      store: inmemory
  storage:
    filesystem:
      chunks_directory: /loki/chunks
      rules_directory: /loki/rules

schema_config:
  configs:
    - from: 2024-04-01
      store: tsdb
      object_store: filesystem
      schema: v13
      index:
        prefix: index_
        period: 24h

limits_config:
  allow_structured_metadata: true
  retention_period: 168h
  retention_stream:
    # Keep noisy host/system logs shorter than application logs.
    - selector: '{job="varlogs"}'
      priority: 1
      period: 72h
    # Keep debug container logs short if LOG_LEVEL is lowered during tests.
    - selector: '{job="docker", level="DEBUG"}'
      priority: 2
      period: 72h
    # Default application logs stay aligned with the global 7-day policy.
    - selector: '{job="docker", level="INFO"}'
      priority: 3
      period: 168h
    # Keep warning/error logs and key entrypoint/business-flow services longer.
    - selector: '{job="docker", level=~"WARNING|ERROR|CRITICAL"}'
      priority: 4
      period: 336h
    - selector: '{job="docker", service=~"api-service|order-service|payment-service"}'
      priority: 5
      period: 336h
  volume_enabled: true

compactor:
  working_directory: /loki/compactor
  retention_enabled: true
  delete_request_store: filesystem

analytics:
  reporting_enabled: false
