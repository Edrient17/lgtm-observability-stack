global:
  resolve_timeout: 5m

route:
  receiver: slack-alerts
  group_by:
    - alertname
    - severity
    - service
  group_wait: 10s
  group_interval: 1m
  repeat_interval: 30m

receivers:
  - name: slack-alerts
    slack_configs:
      - api_url_file: /alertmanager/slack-webhook-url
        send_resolved: true
        title: '{{ if eq .Status "firing" }}[FIRING]{{ else }}[RESOLVED]{{ end }} {{ .CommonLabels.alertname }}'
        text: >-
          {{ range .Alerts }}
          *Severity:* {{ .Labels.severity }}
          *Service:* {{ .Labels.service }}
          *Summary:* {{ .Annotations.summary }}
          *Description:* {{ .Annotations.description }}
          {{ end }}
