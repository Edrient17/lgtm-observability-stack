global:
  resolve_timeout: 5m

route:
  receiver: slack-alerts
  group_by:
    - alertname
    - instance
    - app_service
    - service
    - severity
  group_wait: 10s
  group_interval: 1m
  repeat_interval: 4h

receivers:
  - name: slack-alerts
    slack_configs:
      - api_url_file: /alertmanager/slack-webhook-url
        send_resolved: true
        title: '{{ if eq .Status "firing" }}[FIRING]{{ else }}[RESOLVED]{{ end }} {{ .CommonLabels.alertname }}'
        text: '{{ range .Alerts }}{{ .Annotations.summary }} - {{ .Annotations.description }}{{ "\n" }}{{ end }}'
