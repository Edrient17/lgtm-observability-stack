name: app-vm-msa-alerts
rules:
  - alert: AppMetricsMissing
    expr: absent(up{job="msa-demo"})
    for: 2m
    labels:
      severity: critical
      service: alloy
    annotations:
      summary: "App VM metrics are missing"
      description: "Mimir cannot see MSA metrics from Alloy. Check Alloy metric scraping, Mimir remote_write, and App VM connectivity."

  - alert: MsaServiceDown
    expr: up{job="msa-demo"} == 0
    for: 1m
    labels:
      severity: critical
    annotations:
      summary: "MSA service is down"
      description: "{{ $labels.app_service }} on {{ $labels.instance }} has been unavailable for more than 1 minute."

  - alert: AppVmNodeExporterDown
    expr: up{job="node-exporter", instance="app-vm"} == 0
    for: 1m
    labels:
      severity: warning
      service: node-exporter
    annotations:
      summary: "App VM Node Exporter is down"
      description: "App VM Node Exporter metrics have been unavailable for more than 1 minute."

  - alert: MsaHighErrorRate
    expr: |
      (
        (
          sum by (service) (rate(demo_app_requests_total{endpoint!="metrics",status=~"5.."}[5m]))
          or
          sum by (service) (rate(demo_app_requests_total{endpoint!="metrics"}[5m])) * 0
        )
        /
        clamp_min(sum by (service) (rate(demo_app_requests_total{endpoint!="metrics"}[5m])), 0.001)
      ) > 0.2
      and on (service)
      sum by (service) (rate(demo_app_requests_total{endpoint!="metrics"}[5m])) > 0.01
    for: 1m
    labels:
      severity: warning
    annotations:
      summary: "MSA service has high error rate"
      description: "{{ $labels.service }} has more than 20% 5xx responses for non-metrics requests."

  - alert: MsaHighLatencyP95
    expr: |
      histogram_quantile(
        0.95,
        sum by (le, service) (rate(demo_app_request_duration_seconds_bucket{endpoint!="metrics"}[5m]))
      ) > 1
    for: 2m
    labels:
      severity: warning
    annotations:
      summary: "MSA service has high p95 latency"
      description: "{{ $labels.service }} p95 latency is above 1 second for non-metrics requests."
