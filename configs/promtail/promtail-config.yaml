server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: system
    static_configs:
      - targets:
          - localhost
        labels:
          job: varlogs
          host: ixcloud-vm
          __path__: /var/log/*.log

  - job_name: docker-containers
    pipeline_stages:
      - docker: {}
      - json:
          expressions:
            trace_id: trace_id
            span_id: span_id
            level: level
            logger: logger
      - labels:
          level:
          logger:
          trace_id:
    static_configs:
      - targets:
          - localhost
        labels:
          job: docker
          host: ixcloud-vm
          __path__: /var/lib/docker/containers/*/*.log

