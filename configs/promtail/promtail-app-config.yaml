server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: ${LOKI_PUSH_URL}

scrape_configs:
  - job_name: system
    static_configs:
      - targets:
          - localhost
        labels:
          job: varlogs
          host: ${APP_HOST_LABEL}
          vm_role: app
          __path__: /var/log/*.log

  - job_name: docker-containers
    pipeline_stages:
      - docker: {}
      - json:
          expressions:
            service: service
            trace_id: trace_id
            span_id: span_id
            level: level
            logger: logger
      - labels:
          service:
          level:
          logger:
      - structured_metadata:
          trace_id:
          span_id:
    static_configs:
      - targets:
          - localhost
        labels:
          job: docker
          host: ${APP_HOST_LABEL}
          vm_role: app
          __path__: /var/lib/docker/containers/*/*.log
