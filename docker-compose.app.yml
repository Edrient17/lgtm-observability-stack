name: lgtm-app-stack

x-demo-service: &demo-service
  build:
    context: ./demo-app
  environment: &demo-env
    OTEL_EXPORTER_OTLP_ENDPOINT: http://${MONITORING_VM_PRIVATE_IP}:4317
    OTEL_EXPORTER_OTLP_INSECURE: "true"
    LOG_LEVEL: INFO
  networks:
    - app-observability

services:
  api-service:
    <<: *demo-service
    environment:
      <<: *demo-env
      OTEL_SERVICE_NAME: api-service
      SERVICE_ROLE: api
      PORT: "8080"
      ORDER_SERVICE_URL: http://order-service:8081
    ports:
      - "8080:8080"
    depends_on:
      - order-service

  order-service:
    <<: *demo-service
    environment:
      <<: *demo-env
      OTEL_SERVICE_NAME: order-service
      SERVICE_ROLE: order
      PORT: "8081"
      PAYMENT_SERVICE_URL: http://payment-service:8082
    ports:
      - "8081:8081"
    depends_on:
      - payment-service

  payment-service:
    <<: *demo-service
    environment:
      <<: *demo-env
      OTEL_SERVICE_NAME: payment-service
      SERVICE_ROLE: payment
      PORT: "8082"
    ports:
      - "8082:8082"

  node-exporter:
    image: prom/node-exporter:${NODE_EXPORTER_VERSION:-v1.11.1}
    command:
      - --path.rootfs=/host
    pid: host
    volumes:
      - /:/host:ro,rslave
    ports:
      - "9100:9100"
    networks:
      - app-observability

  promtail:
    image: grafana/promtail:${PROMTAIL_VERSION:-3.6.11}
    command:
      - -config.file=/etc/promtail/promtail-app-config.yaml
      - -config.expand-env=true
    environment:
      LOKI_PUSH_URL: http://${MONITORING_VM_PRIVATE_IP}:3100/loki/api/v1/push
      APP_HOST_LABEL: ${APP_HOST_LABEL:-app-vm}
    volumes:
      - ./configs/promtail/promtail-app-config.yaml:/etc/promtail/promtail-app-config.yaml:ro
      - /var/log:/var/log:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - promtail-positions:/tmp
    networks:
      - app-observability
    depends_on:
      - api-service
      - order-service
      - payment-service

networks:
  app-observability:
    driver: bridge

volumes:
  promtail-positions:
