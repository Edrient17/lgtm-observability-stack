<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="760" viewBox="0 0 1280 760" role="img" aria-labelledby="title desc">
  <title id="title">LGTM two-VM MSA architecture</title>
  <desc id="desc">Monitoring VM runs Grafana, Loki, Mimir, Tempo, Prometheus, OpenTelemetry Collector, MinIO, and Node Exporter. App VM runs api-service, catalog-service, inventory-service, cart-service, order-service, payment-service, Promtail, and Node Exporter.</desc>
  <defs>
    <style>
      .bg { fill: #f7f9fc; }
      .vm { fill: #ffffff; stroke: #263b56; stroke-width: 2; rx: 14; }
      .box { fill: #eef5ff; stroke: #426894; stroke-width: 1.5; rx: 8; }
      .store { fill: #f4f7eb; stroke: #617735; stroke-width: 1.5; rx: 8; }
      .agent { fill: #fff3e7; stroke: #9b6133; stroke-width: 1.5; rx: 8; }
      .title { font: 700 24px Arial, sans-serif; fill: #17324d; }
      .label { font: 700 16px Arial, sans-serif; fill: #17324d; }
      .small { font: 13px Arial, sans-serif; fill: #304b66; }
      .line { fill: none; stroke: #315b83; stroke-width: 2; marker-end: url(#arrow); }
      .dash { fill: none; stroke: #7c6540; stroke-width: 2; stroke-dasharray: 6 5; marker-end: url(#arrow2); }
      .flow { fill: none; stroke: #2d7a52; stroke-width: 2; marker-end: url(#arrow3); }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#315b83"/>
    </marker>
    <marker id="arrow2" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#7c6540"/>
    </marker>
    <marker id="arrow3" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2d7a52"/>
    </marker>
  </defs>

  <rect class="bg" width="1280" height="760"/>
  <text x="40" y="46" class="title">LGTM Observability Stack - Two VM MSA</text>

  <rect x="40" y="80" width="560" height="610" class="vm"/>
  <text x="70" y="120" class="title">Monitoring VM</text>

  <rect x="80" y="155" width="140" height="62" class="box"/>
  <text x="120" y="190" class="label">Grafana</text>

  <rect x="290" y="135" width="120" height="58" class="box"/>
  <text x="333" y="169" class="label">Loki</text>

  <rect x="290" y="225" width="120" height="58" class="box"/>
  <text x="330" y="259" class="label">Mimir</text>

  <rect x="290" y="315" width="120" height="58" class="box"/>
  <text x="328" y="349" class="label">Tempo</text>

  <rect x="80" y="255" width="140" height="62" class="box"/>
  <text x="103" y="291" class="label">Prometheus</text>

  <rect x="80" y="385" width="140" height="62" class="agent"/>
  <text x="106" y="412" class="label">OTel</text>
  <text x="95" y="432" class="small">Collector :4317</text>

  <rect x="290" y="420" width="120" height="58" class="store"/>
  <text x="331" y="454" class="label">MinIO</text>

  <rect x="80" y="520" width="140" height="62" class="agent"/>
  <text x="97" y="547" class="label">Node Exporter</text>
  <text x="126" y="567" class="small">:9100</text>

  <path class="line" d="M220 186 C250 186 260 164 290 164"/>
  <text x="232" y="159" class="small">LogQL</text>
  <path class="line" d="M220 286 C250 286 260 254 290 254"/>
  <text x="232" y="259" class="small">PromQL</text>
  <path class="line" d="M220 186 C255 215 255 344 290 344"/>
  <text x="224" y="342" class="small">TraceQL</text>
  <path class="line" d="M220 286 C245 286 258 254 290 254"/>
  <text x="92" y="345" class="small">remote_write</text>
  <path class="line" d="M410 344 C450 360 455 430 410 449"/>
  <text x="432" y="407" class="small">blocks</text>

  <rect x="680" y="80" width="560" height="610" class="vm"/>
  <text x="710" y="120" class="title">App VM</text>

  <rect x="720" y="155" width="130" height="58" class="box"/>
  <text x="744" y="181" class="label">api-service</text>
  <text x="768" y="200" class="small">:8080</text>

  <rect x="910" y="125" width="150" height="58" class="box"/>
  <text x="932" y="151" class="label">catalog-service</text>
  <text x="968" y="170" class="small">:8081</text>

  <rect x="1090" y="155" width="130" height="58" class="box"/>
  <text x="1101" y="181" class="label">inventory</text>
  <text x="1114" y="200" class="small">service :8082</text>

  <rect x="910" y="255" width="150" height="58" class="box"/>
  <text x="943" y="281" class="label">cart-service</text>
  <text x="968" y="300" class="small">:8083</text>

  <rect x="720" y="365" width="140" height="58" class="box"/>
  <text x="743" y="391" class="label">order-service</text>
  <text x="773" y="410" class="small">:8084</text>

  <rect x="910" y="365" width="150" height="58" class="box"/>
  <text x="931" y="391" class="label">payment-service</text>
  <text x="968" y="410" class="small">:8085</text>

  <rect x="720" y="520" width="140" height="62" class="agent"/>
  <text x="751" y="547" class="label">Promtail</text>
  <text x="746" y="567" class="small">Docker logs</text>

  <rect x="1030" y="520" width="140" height="62" class="agent"/>
  <text x="1047" y="547" class="label">Node Exporter</text>
  <text x="1076" y="567" class="small">:9100</text>

  <path class="flow" d="M850 184 C870 174 888 160 910 154"/>
  <text x="858" y="151" class="small">/browse</text>
  <path class="flow" d="M1060 154 C1075 160 1078 176 1090 184"/>
  <path class="flow" d="M850 192 C884 212 881 262 910 284"/>
  <text x="862" y="244" class="small">/cart/add</text>
  <path class="flow" d="M1060 284 C1090 270 1090 220 1100 205"/>
  <path class="flow" d="M850 200 C884 230 884 255 910 284"/>
  <path class="flow" d="M785 213 C775 260 775 330 790 365"/>
  <text x="704" y="293" class="small">/checkout</text>
  <path class="flow" d="M860 394 C878 394 892 394 910 394"/>
  <path class="flow" d="M860 380 C940 330 1060 245 1100 205"/>

  <path class="dash" d="M720 551 C590 520 480 190 410 164"/>
  <text x="530" y="306" class="small">logs 3100</text>
  <path class="dash" d="M850 551 C760 500 300 455 220 416"/>
  <text x="520" y="486" class="small">traces 4317</text>
  <path class="dash" d="M220 286 C500 230 610 225 720 184"/>
  <text x="440" y="228" class="small">metrics scrape 8080-8085</text>
  <path class="dash" d="M220 286 C555 430 790 540 1030 551"/>
  <text x="465" y="392" class="small">node scrape 9100</text>

  <text x="720" y="638" class="small">External requests hit api-service only. Internal calls create varied metrics, logs, and traces.</text>
</svg>
